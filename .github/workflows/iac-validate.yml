name: CI

# Static validation + offline tests. Runs with NO AWS account and provisions
# nothing — it validates the IaC that *would* create the infrastructure and runs
# the fully-mocked test suite. Four independent jobs run in parallel.

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cfn-lint:
    name: CloudFormation lint (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install cfn-lint
      - name: Lint template at informational severity
        run: >
          cfn-lint
          --include-checks I
          --non-zero-exit-code informational
          --format pretty
          --
          infra/cloudformation.yaml

  checkov:
    name: IaC security scan (checkov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install checkov
      - name: Scan all IaC (CloudFormation + Terraform)
        run: checkov -d infra --skip-path infra/terraform/.terraform --compact

  terraform:
    name: Terraform validate + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
      - name: Format check
        run: terraform -chdir=infra/terraform fmt -check -diff
      - name: Init (no backend, no AWS credentials)
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Validate
        run: terraform -chdir=infra/terraform validate
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: "v0.55.1"
      - name: tflint
        run: tflint --chdir=infra/terraform

  parliament:
    name: IAM least-privilege (parliament)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # parliament still imports the legacy pkg_resources, removed in setuptools 81+
      - run: pip install parliament "setuptools<81"
      - name: Lint IAM policy (one documented false positive filtered)
        run: python infra/lint_iam.py

  tests:
    name: Unit tests (offline, mocked AWS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest -q
